<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hammer - AI Assistant (All-in-One)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Compact input mode */
        .input-compact {
            min-height: 48px;
            max-height: 48px;
            padding: 12px 16px;
            font-size: 14px;
        }
        
        /* Editor mode */
        .input-editor {
            min-height: 200px;
            max-height: 600px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #475569;
        }
        
        .input-editor:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* Toggle button */
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #334155;
            border: none;
            color: #94a3b8;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        
        .toggle-btn:hover {
            background: #475569;
            color: #fff;
        }
        
        .toggle-btn.hidden {
            display: none;
        }
        
        /* Character counter */
        .char-counter {
            font-size: 12px;
            color: #94a3b8;
            text-align: right;
            margin-top: 4px;
        }
        
        /* Scrollbar styling */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        
        textarea::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        textarea::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        
        textarea::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        
        /* Custom scrollbar for chat */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        
        /* Message styles */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.agent .message-content {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }
        
        .message.error .message-content {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #991b1b;
            border-bottom-left-radius: 4px;
        }
        
        .message.system .message-content {
            background: #0f172a;
            color: #94a3b8;
            border: 1px solid #1e293b;
            border-bottom-left-radius: 4px;
        }
        
        /* Typing indicator */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 16px;
            background: #334155;
            border-radius: 16px;
            align-items: center;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #64748b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); }
            40% { transform: scale(1); }
        }
        
        /* Code blocks */
        pre {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        code {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
        }
        
        /* Connection status */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #94a3b8;
        }
        
        .connection-status.connected {
            color: #2ecc71;
        }
        
        .connection-status.disconnected {
            color: #e74c3c;
        }
        
        /* File watcher status */
        .file-watcher-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #fbbf24;
        }
        
        .spinner-small {
            width: 12px;
            height: 12px;
            border: 2px solid #fbbf24;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Agent thought container */
        .agent-thought-container {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .agent-thought-container .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        /* Chat list item */
        .chat-list-item {
            transition: all 0.2s;
        }
        
        .chat-list-item:hover {
            background: #1e293b;
        }
        
        .chat-list-item.active {
            background: #3b82f6;
            color: white;
        }
        
        .chat-list-item.active .delete-chat-button {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .chat-list-item.active .delete-chat-button:hover {
            color: white;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-slate-800/50 backdrop-blur-xl border-r border-slate-700/50 flex flex-col">
            <div class="p-6 border-b border-slate-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-robot text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-white font-bold text-lg">Smart Hammer</h1>
                        <p class="text-slate-400 text-xs">AI Assistant</p>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4">
                <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Чаты</div>
                <button id="new-chat-button" class="w-full flex items-center gap-3 p-3 rounded-xl bg-blue-600/20 border border-blue-500/30 text-white mb-2 hover:bg-blue-600/30 transition-all">
                    <i class="fas fa-plus text-blue-400"></i>
                    <span class="text-sm">Новый чат</span>
                </button>
                
                <div class="mt-4 space-y-1">
                    <button class="w-full flex items-center gap-3 p-3 rounded-xl text-slate-300 hover:bg-slate-700/50 transition-all">
                        <i class="fas fa-history text-slate-500"></i>
                        <span class="text-sm">Проекты</span>
                    </button>
                    <button class="w-full flex items-center gap-3 p-3 rounded-xl text-slate-300 hover:bg-slate-700/50 transition-all">
                        <i class="fas fa-bookmark text-slate-500"></i>
                        <span class="text-sm">Избранное</span>
                    </button>
                </div>
            </div>
            
            <div class="p-4 border-t border-slate-700/50">
                <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700/50 transition-all cursor-pointer">
                    <div class="w-8 h-8 bg-gradient-to-br from-green-400 to-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold">
                        SH
                    </div>
                    <div class="flex-1">
                        <p class="text-white text-sm font-medium">Smart Hammer</p>
                        <p class="text-slate-400 text-xs">Pro Plan</p>
                    </div>
                    <i class="fas fa-chevron-right text-slate-500 text-xs"></i>
                </div>
            </div>
        </aside>
        
        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col">
            <!-- Header -->
            <header class="h-16 border-b border-slate-700/50 flex items-center justify-between px-6 bg-slate-800/30 backdrop-blur-sm">
                <div class="flex items-center gap-4">
                    <i class="fas fa-robot text-blue-400 text-xl"></i>
                    <div>
                        <h2 class="text-white font-semibold">LLM Agent</h2>
                        <div class="flex items-center gap-2">
                            <span id="connection-status" class="connection-status">
                                <span class="w-2 h-2 bg-gray-500 rounded-full"></span>
                                <span>Подключение...</span>
                            </span>
                            <div id="file-watcher-status" class="file-watcher-status hidden">
                                <div class="spinner-small"></div>
                                <span>Индексация...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="auto-confirm-button" class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-all" title="Авто-подтверждение действий">
                        <i class="fas fa-bolt"></i>
                    </button>
                    <button id="freeze-watcher-button" class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-all" title="Приостановить индексацию">
                        <i class="fas fa-snowflake"></i>
                    </button>
                    <a href="/" class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-all">
                        <i class="fas fa-home"></i>
                    </a>
                    <button id="clear-history-button" class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-all" title="Очистить чат">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </header>
            
            <!-- Chat Messages -->
            <div id="message-list" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                <!-- Сообщения будут загружены с сервера -->
            </div>

            <!-- Блок для мыслей агента -->
            <div id="agent-thought-container" class="agent-thought-container hidden">
                <div class="spinner"></div>
                <span id="agent-thought-text">Агент думает...</span>
            </div>

            <!-- Input Area -->
            <div class="p-6 border-t border-slate-700/50 bg-slate-800/30">
                <div class="max-w-4xl mx-auto">
                    <div class="relative">
                        <!-- Compact Input Mode -->
                        <div id="compact-input" class="input-compact">
                            <textarea 
                                id="message-input"
                                placeholder="Введите ваш вопрос... (Shift+Enter для новой строки)"
                                class="w-full bg-slate-800/80 backdrop-blur-sm border border-slate-600/50 rounded-2xl p-4 pr-24 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent resize-none"
                                rows="1"
                                maxlength="500"
                            ></textarea>
                            <button class="toggle-btn" id="toggle-btn" title="Развернуть редактор">
                                <i class="fas fa-expand text-sm"></i>
                            </button>
                            <button class="absolute right-3 bottom-3 p-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all" id="send-button">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                        
                        <!-- Editor Mode -->
                        <div id="editor-input" class="input-editor hidden">
                            <textarea 
                                id="editor-textarea"
                                placeholder="Напишите ваш вопрос здесь..."
                                class="w-full bg-slate-800/80 backdrop-blur-sm border border-slate-600/50 rounded-2xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent resize-none"
                                rows="10"
                            ></textarea>
                            <button class="toggle-btn" id="toggle-editor-btn" title="Свернуть в компактный режим">
                                <i class="fas fa-compress text-sm"></i>
                            </button>
                            <button class="toggle-btn" id="editor-send-button" title="Отправить">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                            <div class="char-counter" id="char-counter">0 / 10000</div>
                        </div>
                    </div>
                    
                    <!-- Toolbar -->
                    <div class="flex items-center justify-between mt-3">
                        <div class="flex items-center gap-2">
                            <button class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-all" title="Прикрепить файл">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <button class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-all" title="Вставить изображение">
                                <i class="fas fa-image"></i>
                            </button>
                            <button class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-lg transition-all" title="Форматирование">
                                <i class="fas fa-bold"></i>
                            </button>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-slate-500 text-xs">Shift + Enter для переноса строки</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- WIDGET TEMPLATES -->
    <template id="chat-list-item-template">
        <li class="chat-list-item group flex items-center justify-between p-2 rounded-md cursor-pointer hover:bg-gray-800" data-session-id="">
            <span class="chat-title truncate flex-grow text-sm"></span>
            <button class="delete-chat-button group-hover:block text-gray-500 hover:text-red-500 text-xs" title="Удалить чат">
                🗑️
            </button>
        </li>
    </template>

    <template id="confirmation-widget-template">
        <div class="message agent">
            <div class="message-content border-l-4 border-amber-500 bg-gray-800/40 p-4">
                <p class="font-bold text-amber-400">⚠️ Запрос на подтверждение действия:</p>
                <p class="my-2" data-role="prompt-text"></p>
                <pre class="bg-gray-950 p-3 rounded font-mono text-xs text-gray-300 overflow-x-auto" data-role="tool-call-json"></pre>
                <div class="confirm-buttons flex gap-3 mt-4">
                    <button data-role="yes-button" class="px-4 py-2 rounded-md text-white bg-green-600 hover:bg-green-700 font-bold cursor-pointer">Да, разрешить</button>
                    <button data-role="no-button" class="px-4 py-2 rounded-md text-white bg-red-600 hover:bg-red-700 cursor-pointer">Отклонить</button>
                </div>
            </div>
        </div>
    </template>

    <template id="plan-confirmation-widget-template">
        <div class="message agent">
            <div class="message-content border-l-4 border-cyan-500 bg-gray-800/30 p-4">
                <p><strong>📋 Составлен пошаговый план. Вы можете отредактировать или перетащить шаги перед запуском:</strong></p>
                <ol data-role="plan-editor-list" class="list-none p-0 m-0 space-y-2 mt-3"></ol>
                <button data-role="add-step-button" class="ml-7 mt-3 px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 text-xs cursor-pointer">+ Добавить шаг</button>
                <div class="confirm-buttons flex gap-3 mt-5">
                    <button data-role="approve-plan-button" class="px-4 py-2 rounded-md text-white bg-green-600 hover:bg-green-700 font-bold cursor-pointer">🚀 Утвердить и запустить</button>
                    <button data-role="reject-plan-button" class="px-4 py-2 rounded-md text-white bg-red-600 hover:bg-red-700 cursor-pointer">Отмена</button>
                </div>
            </div>
        </div>
    </template>

    <template id="plan-step-item-template">
        <li class="flex items-center gap-2 plan-step-item">
            <span class="drag-handle" title="Перетащить">⠿</span>
            <div contenteditable="true" class="plan-step-text flex-grow p-1.5 border border-dashed border-gray-600 rounded bg-gray-900/60 focus:outline-none focus:border-cyan-400 text-sm text-gray-200"></div>
            <button class="btn-remove-step flex-shrink-0 bg-red-700 text-white rounded-full w-6 h-6 font-bold flex items-center justify-center hover:bg-red-600 cursor-pointer" title="Удалить шаг">-</button>
        </li>
    </template>

    <template id="plan-progress-widget-template">
        <div class="message-content border-l-4 border-green-500 bg-gray-800/40 p-4 rounded-r-lg">
            <p class="mt-0 text-green-400 font-bold flex items-center gap-2"><span>⚡</span> Выполнение автономной кампании:</p>
            <ul data-role="progress-list" class="list-none p-0 m-0 space-y-2.5 mt-2"></ul>
        </div>
    </template>

    <template id="error-recovery-widget-template">
        <div class="message agent">
            <div class="message-content border-l-4 border-red-500 bg-gray-800/30 p-4">
                <p class="font-bold text-red-400 flex items-center gap-1"><span>❗️</span> Ошибка выполнения кампании:</p>
                <pre data-role="error-message" class="bg-gray-950 p-3 my-2 rounded font-mono text-xs text-red-300 overflow-x-auto whitespace-pre-wrap"></pre>
                <p class="text-sm my-2">Выберите стратегию восстановления для 🤖 агента:</p>
                <div data-role="button-container" class="confirm-buttons flex flex-wrap gap-2.5 mt-3"></div>
            </div>
        </div>
    </template>

    <!-- Main JavaScript -->
    <script src="/js/index.js"></script>
</body>
</html>
