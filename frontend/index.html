<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hammer Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-900 text-gray-300 flex items-center justify-center min-h-screen font-sans">
    <div class="container max-w-4xl w-full mx-auto bg-gray-800 p-8 rounded-lg shadow-2xl border border-gray-700">
        <h1 class="text-4xl font-bold text-center text-cyan-400 mb-2">Добро пожаловать в Smart Hammer!</h1>
        <p class="text-center text-gray-400 mb-8">Ваш локальный AI-ассистент для анализа кода запущен и готов к работе.</p>
        
        <div class="flex justify-center gap-4 my-8">
            <a href="/chat.html" class="px-6 py-3 bg-cyan-600 text-white font-bold rounded-lg shadow-md hover:bg-cyan-700 transition-colors duration-300">
                🚀 Перейти в чат
            </a>
            <a href="/doc.html" class="px-6 py-3 bg-gray-700 text-white font-bold rounded-lg shadow-md hover:bg-gray-600 transition-colors duration-300">
                📖 Документация
            </a>
        </div>

        <div class="bg-gray-900 border border-gray-700 rounded-lg p-6 mt-10">
            <h2 class="text-2xl font-semibold text-gray-200 mb-4">Информация о сервере</h2>
            <div class="space-y-2 text-gray-400">
                <p>
                    <strong>WebSocket URL:</strong> 
                    <code id="ws-url" class="bg-gray-700 text-cyan-300 px-2 py-1 rounded"></code>
                </p>
                <p>
                    <strong>Frontend:</strong> 
                    <code id="fe-url" class="bg-gray-700 text-cyan-300 px-2 py-1 rounded"></code>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const wsUrlElement = document.getElementById('ws-url');
            const feUrlElement = document.getElementById('fe-url');
            if (wsUrlElement && feUrlElement) {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                wsUrlElement.textContent = `${protocol}//${window.location.hostname}:9000/ws`;
                feUrlElement.textContent = window.location.origin;
            }
        });
    </script>
</body>
</html>
