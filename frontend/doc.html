<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документация - Smart Hammer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/chat.css">
    <style>
        .doc-container {
            max-width: 900px;
            margin: 40px auto;
        }
        /* Стили для контента, сгенерированного из Markdown */
        .doc-content h1, .doc-content h2, .doc-content h3 {
            border-bottom: 1px solid #4a5568;
            padding-bottom: 0.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .doc-content h1 { font-size: 2.25rem; }
        .doc-content h2 { font-size: 1.875rem; }
        .doc-content h3 { font-size: 1.5rem; }
        .doc-content a { color: #63b3ed; text-decoration: underline; }
        .doc-content p { margin-bottom: 1rem; line-height: 1.7; }
        .doc-content code { background-color: #2d3748; color: #e2e8f0; padding: 0.2rem 0.4rem; border-radius: 0.25rem; }
        .doc-content pre { background-color: #1a202c; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .doc-content pre code { padding: 0; background: none; }
        .doc-content ul, .doc-content ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .doc-content li { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-gray-900 text-gray-300 font-sans p-4 md:p-8">
    <div class="doc-container">
        <div id="content" class="doc-content"><p>Загрузка документации...</p></div>
        <a href="/" class="inline-block mt-8 px-6 py-3 bg-cyan-600 text-white font-bold rounded-lg shadow-md hover:bg-cyan-700 transition-colors duration-300">
            &larr; На главную
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/doc.js"></script>
</body>
</html>
