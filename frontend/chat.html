<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с Агентом - Smart Hammer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <h1>🤖 Чат с Агентом</h1>
                <span id="connection-status" class="connection-status">● Онлайн</span>
            </div>
            <div class="header-right">
                <a href="/" class="back-link">На главную</a>
                <button id="clear-chat" class="clear-btn" title="Очистить чат">🗑️</button>
            </div>
        </div>
        <div id="message-list" class="message-list">
            <!-- Messages will be appended here by JavaScript -->
            <div class="message agent">
                <div class="message-content">
                    <p>Привет! Я Smart Hammer, ваш AI-ассистент. Чем могу помочь с вашим проектом?</p>
                </div>
            </div>
        </div>
        <div id="typing-indicator" class="typing-indicator" style="display: none;">
            <span></span><span></span><span></span>
        </div>
        <form id="chat-form" class="chat-form">
            <input type="text" id="message-input" placeholder="Введите ваш вопрос..." autocomplete="off" required>
            <button type="submit">Отправить</button>
        </form>
    </div>

    <script src="chat.js"></script>
</body>
</html>
